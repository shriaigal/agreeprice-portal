<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Manage News</title>
  <style>
    body {
      background-color: #121212;
      color: #fff;
      font-family: Arial, sans-serif;
      padding: 40px;
    }

    h1 {
      text-align: center;
      margin-bottom: 30px;
      color: #00e676;
      font-size: 2.2rem;
    }

    .news-item {
      background: #1e1e1e;
      border: 1px solid #333;
      border-radius: 10px;
      padding: 20px;
      margin-bottom: 20px;
    }

    input, textarea {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      margin-bottom: 10px;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      background: #2c2c2c;
      color: #fff;
    }

    input[readonly], textarea[readonly] {
      background: #2c2c2c;
      color: #aaa;
    }

    button {
      padding: 8px 16px;
      margin-right: 10px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 15px;
    }

    .edit-btn {
      background-color: #2196f3;
      color: white;
    }

    .save-btn {
      background-color: #4caf50;
      color: white;
    }

    .delete-btn {
      background-color: #f44336;
      color: white;
    }

    @media (max-width: 768px) {
      body {
        padding: 20px;
      }

      h1 {
        font-size: 1.8rem;
      }

      .news-item {
        padding: 15px;
      }

      input, textarea {
        font-size: 15px;
        padding: 8px;
      }

      button {
        padding: 6px 12px;
        font-size: 14px;
        margin-bottom: 6px;
      }
    }

    @media (max-width: 480px) {
      h1 {
        font-size: 1.6rem;
      }

      input, textarea {
        font-size: 14px;
        padding: 7px;
      }

      button {
        display: block;
        width: 100%;
        margin: 6px 0;
      }
    }
  </style>
</head>
<body>
  <h1>📢 Manage News</h1>

  {% for news in news_list %}
  <div class="news-item" id="news-{{ news.id }}">
    <input type="text" id="title-{{ news.id }}" value="{{ news.title }}" readonly />
    <textarea id="content-{{ news.id }}" rows="4" readonly>{{ news.content }}</textarea>
    <p style="font-size: 0.9rem; color: #aaa;">🕒 Last Updated: {{ news.date }}</p>

    <button class="edit-btn" onclick="enableEdit({{ news.id }})" id="edit-btn-{{ news.id }}">✏️ Edit</button>
    <button class="save-btn" onclick="saveNews({{ news.id }})" id="save-btn-{{ news.id }}" style="display:none;">💾 Save</button>
    <button class="delete-btn" onclick="deleteNews({{ news.id }})">🗑 Delete</button>
  </div>
  {% endfor %}

  <script>
    function enableEdit(id) {
      document.getElementById('title-' + id).removeAttribute('readonly');
      document.getElementById('content-' + id).removeAttribute('readonly');
      document.getElementById('edit-btn-' + id).style.display = 'none';
      document.getElementById('save-btn-' + id).style.display = 'inline-block';
    }

    function saveNews(id) {
      const title = document.getElementById('title-' + id).value.trim();
      const content = document.getElementById('content-' + id).value.trim();

      if (!title || !content) {
        alert("❗ Both title and content are required.");
        return;
      }

      fetch(`/update_news/${id}`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ title, content })
      })
      .then(res => {
        if (!res.ok) throw new Error("Failed to save");
        alert("✅ News updated successfully.");

        document.getElementById('title-' + id).setAttribute('readonly', true);
        document.getElementById('content-' + id).setAttribute('readonly', true);
        document.getElementById('edit-btn-' + id).style.display = 'inline-block';
        document.getElementById('save-btn-' + id).style.display = 'none';
      })
      .catch(err => {
        console.error(err);
        alert("❌ Error while saving news.");
      });
    }

    function deleteNews(id) {
      if (!confirm("Are you sure you want to delete this news item?")) return;

      fetch(`/delete_news/${id}`, { method: "GET" })
        .then(() => {
          alert("🗑 News deleted.");
          location.reload();
        })
        .catch(err => {
          console.error(err);
          alert("❌ Could not delete.");
        });
    }
  </script>
</body>
</html>
