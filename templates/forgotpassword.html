<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Forgot Password</title>
  <style>
    body {
      background: #121212;
      font-family: 'Segoe UI', Tahoma, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      color: #eee;
    }

    .forgot-password-container {
      background: #1e1e1e;
      padding: 3rem 2rem;
      border-radius: 15px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.6);
      width: 100%;
      max-width: 420px;
      text-align: center; /* Center headings and paragraph */
    }

    .forgot-password-container h2 {
      margin-bottom: 0.5rem;
      color: #fff;
      font-size: 2rem;
    }

    .forgot-password-container p {
      font-size: 1rem;
      margin-bottom: 2rem;
      color: #bbb;
    }

    form {
      display: flex;
      flex-direction: column;
      align-items: center; /* Center form items horizontally */
      width: 100%;
    }

    form input[type="text"],
    form input[type="email"],
    form input[type="password"] {
      width: 100%;
      padding: 1rem;
      margin-bottom: 1.2rem;
      border: 1px solid #333;
      border-radius: 8px;
      background: #2a2a2a;
      color: #eee;
      font-size: 1rem;
      transition: border 0.3s ease, background 0.3s ease;
    }

    form input:focus {
      border: 1px solid #007bff;
      outline: none;
      background: #333;
    }

    form input::placeholder {
      color: #999;
    }

    form button {
      width: 108%;
      padding: 1rem;
      background: #007bff;
      border: none;
      border-radius: 8px;
      color: #fff;
      font-weight: bold;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.3s ease, transform 0.2s ease;
    }

    form button:hover {
      background: #0056b3;
      transform: translateY(-2px);
    }

    .back-link {
      display: block;
      text-align: center;
      margin-top: 1.5rem;
      color: #aaa;
      text-decoration: none;
      font-size: 0.95rem;
    }

    .back-link:hover {
      text-decoration: underline;
    }

    /* Media Queries for Responsive Design */
    @media (max-width: 768px) {
      .forgot-password-container {
        padding: 2rem 1.5rem;
        max-width: 90%;
      }

      .forgot-password-container h2 {
        font-size: 1.75rem;
      }

      .forgot-password-container p {
        font-size: 0.95rem;
      }
    }

    @media (max-width: 480px) {
      .forgot-password-container {
        padding: 1.5rem 1rem;
      }

      .forgot-password-container h2 {
        font-size: 1.5rem;
      }

      form input[type="text"],
      form input[type="email"],
      form input[type="password"] {
        font-size: 0.95rem;
        padding: 0.9rem;
      }

      form button {
        padding: 0.9rem;
        font-size: 0.95rem;
      }
    }
        .flash {
      text-align: center;
      margin-bottom: 15px;
      font-weight: bold;
    }

    .flash.success {
      color: green;
    }

    .flash.error {
      color: red;
    }
  </style>
</head>
<body>
  <div class="forgot-password-container">
    <h2>Forgot Password</h2>
{% with messages = get_flashed_messages(with_categories=true) %}
  {% if messages %}
    {% for category, message in messages %}
      <div class="flash {{ category }}">{{ message }}</div>
    {% endfor %}
  {% endif %}
{% endwith %}
    <p>Verify your details to reset your password securely.</p>
    <form action="/forgot-password" method="POST">
      <input type="text" name="company_name" placeholder="Company Name" required />
      <input type="text" name="company_no" placeholder="Company Number" required />
      <input type="email" name="email" placeholder="Email" required />
      <input type="password" name="new_password" placeholder="New Password" required />
      <button type="submit">Reset Password</button>
    </form>
    <a href="/" class="back-link">Back to Login</a>
  </div>
</body>
<script>
  // Wait for the DOM to load
  document.addEventListener('DOMContentLoaded', function() {
    const flashes = document.querySelectorAll('.flash');
    flashes.forEach(function(flash) {
      // After 5 seconds, fade out
      setTimeout(function() {
        flash.style.opacity = '0';
        // Optional: Remove from DOM after fade-out
        setTimeout(function() {
          flash.remove();
        }, 500);
      }, 5000); // 5000ms = 5 sec
    });
  });
</script>
</html>
